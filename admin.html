<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — OpenHealthPlat</title>
<style>
  :root{--bg:#F7F2EB;--bg2:#FFFFFF;--bg3:#EDE8DF;--border:rgba(0,0,0,0.10);--text:#1A1208;--text2:#6B5E52;--blue:#4A7FA5;--green:#5E8C52;--orange:#C97D2A;--red:#C0392B;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,'Helvetica Neue',sans-serif;min-height:100vh;}
  nav{position:fixed;top:0;width:100%;background:rgba(247,242,235,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:100;}
  .nav-logo{font-size:16px;font-weight:600;color:var(--blue);}
  .nav-badge{background:rgba(74,127,165,0.15);color:var(--blue);font-size:11px;padding:3px 8px;border-radius:980px;font-weight:600;margin-left:8px;}
  .nav-right{display:flex;align-items:center;gap:12px;}
  .nav-user{font-size:14px;color:var(--text2);}
  .btn-sm{background:none;border:1px solid var(--border);color:var(--text2);padding:6px 12px;border-radius:980px;font-size:13px;cursor:pointer;text-decoration:none;}
  .btn-sm:hover{border-color:var(--red);color:var(--red);}
  main{padding-top:72px;padding-bottom:60px;max-width:1000px;margin:0 auto;padding-left:24px;padding-right:24px;}
  .page-title{font-size:26px;font-weight:600;letter-spacing:-0.03em;margin-bottom:4px;}
  .page-sub{color:var(--text2);font-size:14px;margin-bottom:32px;}
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:32px;}
  .stat{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px;}
  .stat-label{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;}
  .stat-value{font-size:32px;font-weight:700;line-height:1;}
  .stat-sub{font-size:12px;color:var(--text2);margin-top:4px;}
  .section{background:var(--bg2);border:1px solid var(--border);border-radius:18px;overflow:hidden;margin-bottom:24px;}
  .section-header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .section-title{font-size:15px;font-weight:600;}
  .user-row{display:grid;grid-template-columns:1fr auto auto auto;gap:16px;align-items:center;padding:14px 20px;border-bottom:1px solid var(--border);font-size:14px;}
  .user-row:last-child{border-bottom:none;}
  .user-row:hover{background:var(--bg3);}
  .user-name{font-weight:500;}
  .user-email{font-size:13px;color:var(--text2);}
  .role-select{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:13px;color:var(--text);cursor:pointer;outline:none;}
  .role-select:focus{border-color:var(--blue);}
  .btn-update{background:var(--blue);color:#fff;border:none;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:opacity 0.2s;}
  .btn-update:hover{background:#3a6f95;}
  .date-cell{font-size:12px;color:var(--text2);}
  .loading{text-align:center;padding:40px;color:var(--text2);font-size:15px;}
  .empty{text-align:center;padding:40px;color:var(--text2);}
  .roles-bar{display:flex;gap:8px;flex-wrap:wrap;padding:16px 20px;}
  .role-chip{background:var(--bg3);border-radius:10px;padding:12px 18px;text-align:center;}
  .role-chip-count{font-size:22px;font-weight:700;}
  .role-chip-label{font-size:12px;color:var(--text2);margin-top:2px;}
</style>
</head>
<body>
<nav>
  <div style="display:flex;align-items:center">
    <div class="nav-logo">🌿 OpenHealthPlat</div>
    <span class="nav-badge">ADMIN</span>
  </div>
  <div class="nav-right">
    <span class="nav-user" id="navName"></span>
    <a href="dashboard.html" class="btn-sm">← Dashboard</a>
    <button class="btn-sm" onclick="logout()">Déconnexion</button>
  </div>
</nav>

<main>
  <div class="page-title">🔐 Panel Administrateur</div>
  <p class="page-sub" id="pageSubtitle">Chargement...</p>

  <div class="stats-grid">
    <div class="stat"><div class="stat-label">Utilisateurs</div><div class="stat-value" id="sUsers">—</div><div class="stat-sub">inscrits</div></div>
    <div class="stat"><div class="stat-label">Rendez-vous</div><div class="stat-value" id="sRdv">—</div><div class="stat-sub">total</div></div>
    <div class="stat"><div class="stat-label">Téléconsultations</div><div class="stat-value" id="sTele">—</div><div class="stat-sub">total</div></div>
    <div class="stat"><div class="stat-label">Messages</div><div class="stat-value" id="sMsg">—</div><div class="stat-sub">échangés</div></div>
  </div>

  <div class="section" style="margin-bottom:24px">
    <div class="section-header"><span class="section-title">Répartition par rôle</span></div>
    <div class="roles-bar" id="rolesBar"><div class="loading">Chargement...</div></div>
  </div>

  <div class="section">
    <div class="section-header">
      <span class="section-title">Utilisateurs</span>
      <span style="font-size:12px;color:var(--text2)" id="userCount"></span>
    </div>
    <div id="usersList"><div class="loading">Chargement des utilisateurs...</div></div>
  </div>
</main>

<script>
const API = 'https://openhealthplat-site.onrender.com';
const token = localStorage.getItem('ohp_token');
const user = JSON.parse(localStorage.getItem('ohp_user') || '{}');
if (!token) { window.location.href = 'login.html'; }
document.getElementById('navName').textContent = user.full_name || '';

async function loadAdmin() {
  try {
    const [statsRes, usersRes] = await Promise.all([
      fetch(API + '/admin/stats', { headers: { 'Authorization': 'Bearer ' + token } }),
      fetch(API + '/admin/users', { headers: { 'Authorization': 'Bearer ' + token } })
    ]);

    if (statsRes.status === 403 || usersRes.status === 403) {
      document.getElementById('pageSubtitle').textContent = 'Accès refusé — compte non-admin';
      document.getElementById('usersList').innerHTML = '<div class="empty">Votre compte n\'a pas les droits administrateur.</div>';
      return;
    }
    if (statsRes.status === 401 || usersRes.status === 401) {
      localStorage.clear(); window.location.href = 'login.html'; return;
    }
    if (!statsRes.ok || !usersRes.ok) throw new Error('Erreur serveur');

    const stats = await statsRes.json();
    const users = await usersRes.json();

    document.getElementById('sUsers').textContent = stats.total_users || 0;
    document.getElementById('sRdv').textContent = stats.total_appointments || 0;
    document.getElementById('sTele').textContent = stats.total_teleconsultations || 0;
    document.getElementById('sMsg').textContent = stats.total_messages || 0;
    document.getElementById('pageSubtitle').textContent = 'Bienvenue, ' + (user.full_name || '') + ' — ' + (stats.total_users || 0) + ' utilisateur(s)';

    const roles = stats.roles || {};
    const roleLabels = { patient: 'Patients', medecin: 'Médecins', admin: 'Admins' };
    const roleColors = { patient: 'var(--text)', medecin: 'var(--green)', admin: 'var(--blue)' };
    document.getElementById('rolesBar').innerHTML = Object.entries(roles).map(([role, count]) =>
      '<div class="role-chip"><div class="role-chip-count" style="color:' + (roleColors[role]||'var(--text)') + '">' + count + '</div><div class="role-chip-label">' + (roleLabels[role]||role) + '</div></div>'
    ).join('') || '<div style="padding:8px;color:var(--text2);font-size:14px">Aucun utilisateur</div>';

    document.getElementById('userCount').textContent = users.length + ' utilisateur' + (users.length > 1 ? 's' : '');
    if (!users.length) {
      document.getElementById('usersList').innerHTML = '<div class="empty">Aucun utilisateur</div>';
      return;
    }
    document.getElementById('usersList').innerHTML = users.map(u =>
      '<div class="user-row" id="row_' + u.id + '">' +
        '<div><div class="user-name">' + u.full_name + '</div><div class="user-email">' + u.email + '</div></div>' +
        '<div class="date-cell">' + new Date(u.created_at).toLocaleDateString('fr-FR') + '</div>' +
        '<select class="role-select" id="role_' + u.id + '" onchange="showUpdate(\'' + u.id + '\')">' +
          '<option value="patient"' + (u.role==='patient'?' selected':'') + '>Patient</option>' +
          '<option value="medecin"' + (u.role==='medecin'?' selected':'') + '>Médecin</option>' +
          '<option value="admin"' + (u.role==='admin'?' selected':'') + '>Admin</option>' +
        '</select>' +
        '<button class="btn-update" id="btn_' + u.id + '" style="opacity:0" onclick="updateRole(\'' + u.id + '\')">Sauver</button>' +
      '</div>'
    ).join('');
  } catch(e) {
    document.getElementById('pageSubtitle').textContent = 'Erreur de chargement';
    document.getElementById('usersList').innerHTML = '<div class="empty">' + e.message + '</div>';
  }
}

function showUpdate(id) { document.getElementById('btn_' + id).style.opacity = '1'; }

async function updateRole(userId) {
  const role = document.getElementById('role_' + userId).value;
  const btn = document.getElementById('btn_' + userId);
  btn.textContent = '…';
  try {
    const res = await fetch(API + '/admin/users/' + userId + '/role', {
      method: 'PUT',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ role })
    });
    if (res.ok) {
      btn.textContent = '✓'; btn.style.background = 'var(--green)';
      setTimeout(() => { btn.textContent = 'Sauver'; btn.style.background = ''; btn.style.opacity = '0'; }, 2000);
    } else {
      btn.textContent = '✗'; btn.style.background = 'var(--red)';
      setTimeout(() => { btn.textContent = 'Sauver'; btn.style.background = ''; }, 2000);
    }
  } catch(e) { btn.textContent = '✗'; btn.style.background = 'var(--red)'; }
}

function logout() { localStorage.clear(); window.location.href = 'login.html'; }
loadAdmin();
</script>
</body>
</html>
