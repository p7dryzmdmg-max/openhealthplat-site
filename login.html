<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — OpenHealthPlat</title>
<style>
  :root { --bg:#F7F2EB;--bg2:#FFFFFF;--border:rgba(0,0,0,0.10);--text:#1A1208;--text2:#6B5E52;--blue:#4A7FA5;--green:#5E8C52;--red:#C0392B; }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,'Helvetica Neue',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
  .logo{font-size:20px;font-weight:600;color:var(--green);margin-bottom:40px;letter-spacing:-0.02em;}
  .card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:420px;}
  h1{font-size:24px;font-weight:600;letter-spacing:-0.03em;margin-bottom:8px;}
  .subtitle{color:var(--text2);font-size:15px;margin-bottom:32px;}
  .form-group{margin-bottom:16px;}
  label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px;font-weight:500;}
  input{width:100%;background:#F0EBE3;border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:16px;outline:none;transition:border-color 0.2s;}
  input:focus{border-color:var(--blue);}
  .btn{width:100%;background:var(--blue);color:#fff;border:none;border-radius:980px;padding:14px;font-size:16px;font-weight:500;cursor:pointer;margin-top:8px;transition:background 0.2s,transform 0.15s;}
  .btn:hover{background:#0077ed;transform:scale(1.01);}
  .btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
  .error{background:rgba(255,69,58,0.1);border:1px solid rgba(255,69,58,0.3);border-radius:10px;padding:12px;color:var(--red);font-size:14px;margin-bottom:16px;display:none;}
  .server-status{display:flex;align-items:center;gap:8px;font-size:13px;padding:10px 14px;border-radius:10px;margin-bottom:16px;transition:all 0.3s;}
  .server-status.waking{background:rgba(255,159,10,0.1);border:1px solid rgba(255,159,10,0.3);color:#ff9f0a;}
  .server-status.ready{background:rgba(48,209,88,0.1);border:1px solid rgba(48,209,88,0.3);color:var(--green);}
  .server-status.hidden{display:none;}
  .dot{width:8px;height:8px;border-radius:50%;background:currentColor;animation:blink 1s infinite;}
  .ready .dot{animation:none;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
  .footer-link{text-align:center;margin-top:24px;color:var(--text2);font-size:14px;}
  .footer-link a{color:var(--blue);text-decoration:none;}
  .home-link{text-align:center;margin-top:12px;}
  .home-link a{color:var(--text2);font-size:13px;text-decoration:none;}
</style>
</head>
<body>
<div class="logo">🌿 OpenHealthPlat</div>
<div class="card">
  <h1>Connexion</h1>
  <p class="subtitle">Bienvenue ! Entrez vos identifiants.</p>
  <div class="server-status hidden" id="serverStatus"><div class="dot"></div><span id="serverMsg"></span></div>
  <div class="error" id="error"></div>
  <form id="loginForm">
    <div class="form-group">
      <label>Adresse e-mail</label>
      <input type="email" id="email" placeholder="marie@exemple.com" required>
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" id="password" placeholder="Votre mot de passe" required>
    </div>
    <button type="submit" class="btn" id="submitBtn">Se connecter →</button>
  </form>
  <div class="footer-link">Pas encore de compte ? <a href="register.html">S'inscrire gratuitement</a></div>
  <div class="home-link"><a href="index.html">← Retour à l'accueil</a></div>
</div>
<script>
const API = 'https://openhealthplat-site.onrender.com';
const statusEl = document.getElementById('serverStatus');
const statusMsg = document.getElementById('serverMsg');
let serverReady = false;

// Pré-chauffe le serveur dès l'ouverture de la page
async function wakeServer() {
  statusEl.className = 'server-status waking';
  statusMsg.textContent = 'Connexion au serveur… (première connexion ~30 sec)';
  statusEl.classList.remove('hidden');
  for (let i = 0; i < 10; i++) {
    try {
      const res = await fetch(`${API}/health`, { signal: AbortSignal.timeout(8000) });
      if (res.ok) {
        serverReady = true;
        statusEl.className = 'server-status ready';
        statusMsg.textContent = 'Serveur prêt ✓';
        setTimeout(() => statusEl.classList.add('hidden'), 2500);
        return;
      }
    } catch(e) {}
    await new Promise(r => setTimeout(r, 4000));
  }
  // Après 10 tentatives, on laisse l'utilisateur essayer quand même
  statusEl.classList.add('hidden');
  serverReady = true;
}

wakeServer();

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const errEl = document.getElementById('error');
  errEl.style.display = 'none';
  btn.disabled = true;

  // Si serveur pas encore prêt, on attend max 20s
  if (!serverReady) {
    btn.textContent = '⏳ Serveur en démarrage…';
    for (let i = 0; i < 5; i++) {
      await new Promise(r => setTimeout(r, 4000));
      if (serverReady) break;
    }
  }

  btn.textContent = 'Connexion en cours…';
  try {
    const res = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email: document.getElementById('email').value, password: document.getElementById('password').value}),
      signal: AbortSignal.timeout(15000)
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Identifiants incorrects');
    localStorage.setItem('ohp_token', data.token);
    localStorage.setItem('ohp_user', JSON.stringify(data.user));
    window.location.href = 'dashboard.html';
  } catch(err) {
    const msg = err.name === 'TimeoutError' ? 'Serveur lent, réessayez dans 15 secondes.' : err.message;
    errEl.textContent = '❌ ' + msg;
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Se connecter →';
  }
});
</script>
</body>
</html>
